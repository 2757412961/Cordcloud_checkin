name: cloak_brower_checkin
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 
jobs:
  auto_checkin:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Check Date
        run: date
      - name: Check out cordcloud_api branch
        uses: actions/checkout@v6
        with:
          ref: master
      - name: astral-sh/setup-uv
        # You may pin to the exact commit or the version.
        # uses: astral-sh/setup-uv@4959332f0f014c5280e7eac8b70c90cb574c9f9b
        uses: astral-sh/setup-uv@v8.1.0
        with:
          # The version of uv to install e.g., `0.5.0` Defaults to the version in pyproject.toml or 'latest'.
          version: latest # optional, default is 
          # Path to a file containing the version of uv to install. Defaults to searching for uv.toml and if not found pyproject.toml.
          python-version: 3.12 # optional
          # Enable uploading of the uv cache
          enable-cache: true # optional, default is auto
          # Glob pattern to match files relative to the repository root to control the cache.
      - name: install dependencies
        run:
          uv sync
      - name: run task
        env:
          CORDCLOUD_EMAIL: ${{ secrets.CORDCLOUD_EMAIL }}
          CORDCLOUD_PASSWORD: ${{ secrets.CORDCLOUD_PASSWORD }}
          POP3_USERNAME: ${{ secrets.POP3_USERNAME }}
          POP3_PASSWORD: ${{ secrets.POP3_PASSWORD }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          POP3_HOST: ${{ vars.POP3_HOST }}
          POP3_PORT: ${{ vars.POP3_PORT }}
          POP3_USE_SSL: ${{ vars.POP3_USE_SSL }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USE_SSL: ${{ vars.SMTP_USE_SSL }}
          USE_PERSISTENT_CONTEXT: ${{ vars.USE_PERSISTENT_CONTEXT }}
          HEADLESS: ${{ vars.HEADLESS }}
          SAVE_HTML: ${{ vars.SAVE_HTML }}
        run:
          uv run python main.py
    
